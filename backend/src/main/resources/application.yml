spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dsaroadmap}
    username: ${SPRING_DATASOURCE_USERNAME:dsaroadmap}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:satysaivanapalli47@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

brevo:
  api:
    key: ${BREVO_API_KEY:default}

jwt:
  secret: ${JWT_SECRET:ThisIsAVerySecretKeyForJWTAuthThatIsVeryLongAndMustBeAtLeast256BitsLong}
  expiration: 2592000000 # 30 days
  refresh-expiration: 2592000000 # 30 days

