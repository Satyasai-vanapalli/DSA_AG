spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dsaroadmap}
    username: ${SPRING_DATASOURCE_USERNAME:dsaroadmap}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:satysaivanapalli47@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

brevo:
  api:
    key: ${BREVO_API_KEY:default}

jwt:
  secret: ${JWT_SECRET:ThisIsAVerySecretKeyForJWTAuthThatIsVeryLongAndMustBeAtLeast256BitsLong}
  expiration: 86400000 # 24 hours
  refresh-expiration: 604800000 # 7 days
